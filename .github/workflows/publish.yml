name: Publish Python package

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.11"

      - name: Check publish workflow policy
        run: python scripts/check_publish_workflow_policy.py

      - name: Install dependency audit tooling
        run: python -m pip install --upgrade pip-audit

      - name: Install pinned OSV Scanner
        run: python scripts/install_osv_scanner.py --destination .tools/osv-scanner

      - name: Run pip-audit dependency gate
        run: python scripts/check_dependency_security.py

      - name: Run OSV Scanner dependency and manifest gate
        env:
          OSV_SCANNER: .tools/osv-scanner
        run: python scripts/check_osv_scanner.py

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          with open("pyproject.toml", "rb") as handle:
              version = tomllib.load(handle)["project"]["version"]
          expected = f"v{version}"
          if tag != expected:
              print(
                  f"release tag {tag!r} does not match pyproject.toml version {version!r}; "
                  f"expected {expected!r}",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          print(f"release tag {tag!r} matches pyproject.toml version {version!r}")
          PY

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release' && github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-package-distributions
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
