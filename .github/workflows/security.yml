name: Security checks

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-security:
    name: Dependency security gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install dependency audit tooling
        run: python -m pip install --upgrade pip-audit

      - name: Install pinned OSV Scanner
        run: python scripts/install_osv_scanner.py --destination .tools/osv-scanner

      - name: Run pip-audit dependency gate
        run: python scripts/check_dependency_security.py

      - name: Run OSV Scanner dependency and manifest gate
        env:
          OSV_SCANNER: .tools/osv-scanner
        run: python scripts/check_osv_scanner.py
