# Safe localhost-only Manuheart example.
# Run from repository root with:
#   ./bin/manuheart.sh --once --config ./examples/localhost/manuheart.conf

VARDIR:              _CONFIGDIR_/var/manuheart
LOGFILE:             _CONFIGDIR_/var/manuheart.log
LOGLEVEL:            3
CHECKPERIOD:         3
RUNMODE:             once
GROUPFILE:           _CONFIGDIR_/groups
HOSTFILE:            _CONFIGDIR_/hosts
HOSTSTATUSOUTFILE:   _VARDIR_/status/hoststatus
GROUPSTATUSOUTFILE:  _VARDIR_/status/groupstatus
SYSSTATUSOUTFILE:    _VARDIR_/status/sysstatus
